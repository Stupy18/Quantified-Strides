services:
  db:
    image: pgvector/pgvector:pg16
    container_name: quantifiedstrides_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quantifiedstrides
      POSTGRES_USER: quantified
      POSTGRES_PASSWORD: "2026"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantified -d quantifiedstrides"]
      interval: 5s
      timeout: 5s
      retries: 15

  flyway:
    image: flyway/flyway:10
    container_name: quantifiedstrides_flyway
    command: migrate
    volumes:
      - ./QuantifiedStrides/db/flyway:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/quantifiedstrides
      FLYWAY_USER: quantified
      FLYWAY_PASSWORD: "2026"
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_BASELINE_VERSION: "1"
      FLYWAY_CONNECT_RETRIES: "5"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:alpine
    container_name: quantifiedstrides_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build: ./QuantifiedStrides
    image: quantifiedstrides-backend
    container_name: quantifiedstrides_be
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      redis:
        condition: service_started
    env_file:
      - ./QuantifiedStrides/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      API_CORS_ORIGINS: '["http://localhost","http://localhost:5173"]'
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - garmin_tokens:/root/.garmin_tokens

  seed:
    build: ./QuantifiedStrides
    image: quantifiedstrides-backend
    container_name: quantifiedstrides_seed
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      backend:
        condition: service_started
    env_file:
      - ./QuantifiedStrides/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: quantifiedstrides
      DB_USER: quantified
      DB_PASSWORD: "2026"
    entrypoint: ["/bin/sh", "-c", "tr -d '\\r' < scripts/seed_docker.sh | /bin/sh"]

  frontend:
    build: ./frontend
    container_name: quantifiedstrides_fe
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  mobile:
    build:
      context: ./mobile/mobile
      dockerfile: Dockerfile.dev
    tty: true
    container_name: quantifiedstrides_mobile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "19000:19000"
      - "19001:19001"
      - "8081:8081"
    volumes:
      - ./mobile/mobile/src:/app/src
      - ./mobile/mobile/app:/app/app
      - ./mobile/mobile/assets:/app/assets
    environment:
      # URL the device/emulator uses to reach the backend.
      # 10.0.2.2 = Android emulator alias for host machine.
      # Physical device: replace with your LAN IP.
      EXPO_PUBLIC_API_URL: http://${MOBILE_HOST_IP}:8000
      # Metro advertises this IP in the QR code / bundle URL.
      # Must be reachable from the device — 10.0.2.2 for emulator, LAN IP for physical.
      REACT_NATIVE_PACKAGER_HOSTNAME: ${MOBILE_HOST_IP}

volumes:
  pgdata:
  garmin_tokens:
  redis-data:
