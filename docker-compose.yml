services:
  db:
    image: pgvector/pgvector:pg16
    container_name: quantifiedstrides_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quantifiedstrides
      POSTGRES_USER: quantified
      POSTGRES_PASSWORD: "2026"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./QuantifiedStrides/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantified -d quantifiedstrides"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:alpine
    container_name: quantifiedstrides_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build: ./QuantifiedStrides
    image: quantifiedstrides-backend
    container_name: quantifiedstrides_be
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./QuantifiedStrides/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      API_CORS_ORIGINS: '["http://localhost","http://localhost:5173"]'
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - garmin_tokens:/root/.garmin_tokens

  seed:
    build: ./QuantifiedStrides
    image: quantifiedstrides-backend
    container_name: quantifiedstrides_seed
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - ./QuantifiedStrides/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: quantifiedstrides
      DB_USER: quantified
      DB_PASSWORD: "2026"
    entrypoint: ["/bin/sh", "-c", "tr -d '\\r' < scripts/seed_docker.sh | /bin/sh"]

  frontend:
    build: ./frontend
    container_name: quantifiedstrides_fe
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  garmin_tokens:
  redis-data:
